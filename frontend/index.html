<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Krucx Bot — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="app">

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar">

      <div class="sidebar-header">
        <div class="sidebar-brand">
          <div class="brand-avatar">K</div>
          <span class="brand-name">Krucx Bot</span>
        </div>
        <div class="sidebar-actions">
          <span class="lead-count" id="lead-count"></span>
          <button class="icon-btn" id="refresh-btn" title="Refresh">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M17.65 6.35A7.958 7.958 0 0012 4C7.58 4 4 7.58 4 12s3.58 8 8 8 8-3.58 8-8h-2c0 3.31-2.69 6-6 6s-6-2.69-6-6 2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L11 13h7V6l-2.35 0.35z"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>
        <input
          type="text"
          class="search-input"
          id="search"
          placeholder="Search name, phone, or industry"
          autocomplete="off"
        />
      </div>

      <div class="lead-list" id="lead-list"></div>

      <div class="sidebar-footer" id="last-refresh"></div>

    </aside>

    <!-- ===== MAIN PANEL ===== -->
    <main class="main">

      <!-- Empty state -->
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">
          <svg viewBox="0 0 80 80" width="80" height="80">
            <circle cx="40" cy="40" r="38" fill="#d9fdd3"/>
            <path d="M40 14c-14.4 0-26 11.6-26 26 0 5 1.4 9.7 3.8 13.7L14 66l12.7-3.7c3.8 2.1 8.2 3.3 12.9 3.3 14.4 0 26-11.6 26-26S54.4 14 40 14z" fill="#25D366"/>
            <path d="M40 19c-11.6 0-21 9.4-21 21 0 4 1.1 7.7 3.1 10.9L19 61l10.3-3.1A20.9 20.9 0 0040 61c11.6 0 21-9.4 21-21S51.6 19 40 19z" fill="white"/>
            <circle cx="31" cy="40" r="2.5" fill="#25D366"/>
            <circle cx="40" cy="40" r="2.5" fill="#25D366"/>
            <circle cx="49" cy="40" r="2.5" fill="#25D366"/>
          </svg>
        </div>
        <h2 class="empty-title">Krucx Bot Dashboard</h2>
        <p class="empty-text">Select a conversation to view messages and lead details</p>
        <p class="empty-note">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" style="vertical-align:middle;margin-right:4px">
            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
          </svg>
          Admin access only
        </p>
      </div>

      <!-- Conversation view (hidden until a lead is selected) -->
      <div class="conv-wrap" id="conv-wrap" style="display:none">

        <div class="conv-header">
          <div class="conv-avatar" id="conv-avatar"></div>
          <div class="conv-info">
            <div class="conv-name" id="conv-name"></div>
            <div class="conv-sub" id="conv-sub"></div>
          </div>
          <div class="conv-header-right">
            <div class="score-chip" id="conv-score"></div>
            <button class="icon-btn icon-btn--dark" id="copy-phone-btn" title="Copy phone number">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
              </svg>
            </button>
          </div>
        </div>

        <details class="profile-strip" id="profile-strip">
          <summary class="profile-summary">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor" style="vertical-align:middle;margin-right:6px">
              <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
            Lead Profile
          </summary>
          <div class="profile-fields" id="profile-fields"></div>
        </details>

        <div class="messages" id="messages"></div>

        <div class="new-msg-banner" id="new-msg-banner" style="display:none">
          ↓ New messages
        </div>

      </div>

    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
